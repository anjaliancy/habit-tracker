<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanctuary | Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Map to resolve external dependencies -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "lucide-react": "https://esm.sh/lucide-react@0.454.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Note: In a local environment or Vercel, browser-native ESM requires valid paths. 
         If running via a dev server (Vite), ./App.jsx works. 
         If running as a static file, ensure you are using a local server (e.g., Live Server). -->
    <script type="module">
      import React from 'react';
      import ReactDOM from 'react-dom/client';
      import App from './App.jsx';
      
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(
        React.createElement(React.StrictMode, null, React.createElement(App))
      );
    </script>
  </body>
</html>
